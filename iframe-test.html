<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Frontend - Iframe Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 90%;
            height: 90%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <script>
        // Dynamically set iframe src with parent origin as query param
        const parentOrigin = encodeURIComponent(window.location.origin);
        const iframe = document.createElement('iframe');
        iframe.src = `https://org4.cus.ctnxt.clootrack.com/analysis/a6a44c37-1f8c-4432-8b4e-1e7beb3f0829/dashboard?tab=0?parentOrigin=${parentOrigin}&tab=0`; 
        document.body.appendChild(iframe);
    </script>
</body>
</html>
